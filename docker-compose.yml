services:
  vuddy:
    build:
      context: ./docker/vuddy
      dockerfile: Dockerfile
    image: vuddy:0.1.0
    container_name: vuddy
    working_dir: /app/vuddy
    tty: true
    stdin_open: true
    environment:
      - PYTHONUNBUFFERED=1
    # Allow entering a bash shell and running commands directly if needed
    command: ["/bin/bash", "-lc", "echo 'VUDDY Container Ready' && bash"]
    volumes: # TODO: In production, include via Dockerfile COPY (no volume mount)
      - ./baseline/vuddy:/app/vuddy:rw

  deepwukong:
    build:
      context: ./docker/deepwukong
      dockerfile: Dockerfile
    image: deepwukong:0.1.0
    container_name: deepwukong
    working_dir: /code/models/DeepWukong
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    # Allow entering a bash shell and running commands directly if needed
    command: ["/bin/bash", "-lc", "echo 'DeepWukong Container Ready' && bash"]
    volumes: # TODO: In production, include via Dockerfile COPY (no volume mount)
      - ./baseline/RealVul/Experiments/DeepWukong:/code/models/DeepWukong:rw
      - ./downloads/DeepWukong/data/CWE119:/code/models/DeepWukong/data/CWE119:ro
      - ./downloads/RealVul/datasets:/data/dataset:ro

  linevul:
    build:
      context: ./docker/linevul
      dockerfile: Dockerfile
    image: linevul:0.1.0
    container_name: linevul
    working_dir: /app
    tty: true
    stdin_open: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Allow entering a bash shell and running commands directly if needed
    command: ["/bin/bash", "-lc", "echo 'LineVul Container Ready' && bash"]
    volumes:
      # 코드 (개발용 rw)
      - ./baseline/RealVul/LineVul:/app/RealVul/LineVul:rw
      # Experiments (실험 결과 저장 rw)
      - ./baseline/RealVul/Experiments/LineVul:/app/RealVul/Experiments/LineVul:rw
      # 데이터 (읽기 전용 ro)
      - ./downloads/RealVul/datasets:/app/RealVul/Dataset:rw
      - ./downloads/LineVul/models:/app/RealVul/LineVul/linevul/saved_models:rw

  pdbert:
    build:
      context: ./docker/pdbert
      dockerfile: Dockerfile
    image: pdbert:0.1.0
    container_name: pdbert
    working_dir: /
    tty: true
    stdin_open: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Allow entering a bash shell and running commands directly if needed
    command: ["/bin/bash", "-lc", "echo 'PDBERT Container Ready' && bash"]
    volumes: # TODO: In production, include via Dockerfile COPY (no volume mount)
      - ./baseline/PDBERT:/PDBERT:rw