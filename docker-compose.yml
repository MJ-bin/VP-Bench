services:
  vuddy:
    build:
      context: ./docker/vuddy
      dockerfile: Dockerfile
    image: vuddy:0.1.0
    container_name: vuddy
    working_dir: /app/vuddy/hmark
    tty: true
    stdin_open: true
    environment:
      - PYTHONUNBUFFERED=1
    # Allow entering a bash shell and running commands directly if needed
    command: ["/bin/bash", "-lc", "echo 'VUDDY Container Ready' && bash"]

  deepwukong:
    build:
      context: ./docker/deepwukong
      dockerfile: Dockerfile
    image: deepwukong:0.1.0
    container_name: deepwukong
    working_dir: /code/models/DeepWukong
    tty: true
    stdin_open: true
    # Allow entering a bash shell and running commands directly if needed
    command: ["/bin/bash", "-lc", "echo 'DeepWukong Container Ready' && bash"]

  linevul:
    build:
      context: ./docker/linevul
      dockerfile: Dockerfile
    image: linevul:0.1.0
    container_name: linevul
    working_dir: /app
    tty: true
    stdin_open: true
    # Allow entering a bash shell and running commands directly if needed
    command: ["/bin/bash", "-lc", "echo 'LineVul Container Ready' && bash"]